<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git 使用简易指南</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Git 使用简易指南</h1>
        <p>常用 Git 命令快速参考</p>
    </header>

    <main>
        <section>
            <h2>🆕 新建仓库</h2>
            <div class="command-group">
                <div class="command-item">
                    <div class="command">git init</div>
                    <div class="description">初始化一个新的 Git 仓库</div>
                </div>
                <div class="command-item">
                    <div class="command">git clone &lt;url&gt;</div>
                    <div class="description">克隆一个已有仓库到本地</div>
                </div>
            </div>
        </section>

        <section>
            <h2>📝 日常操作</h2>
            <div class="command-group">
                <div class="command-item">
                    <div class="command">git status</div>
                    <div class="description">查看当前工作区状态</div>
                </div>
                <div class="command-item">
                    <div class="command">git add &lt;file&gt;</div>
                    <div class="description">添加文件到暂存区</div>
                </div>
                <div class="command-item">
                    <div class="command">git commit -m "message"</div>
                    <div class="description">提交暂存区的更改到仓库</div>
                </div>
                <div class="command-item">
                    <div class="command">git diff</div>
                    <div class="description">查看工作区和暂存区的差异</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>简洁至上 · 快速参考</p>
    </footer>
</body>
</html>
